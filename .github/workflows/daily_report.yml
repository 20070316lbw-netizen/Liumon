name: Liumon Daily Report Automation

on:
  schedule:
    # 每天 UTC 时间 08:00 (北京时间 16:00) 执行
    - cron: '0 8 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 确保版本兼容

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f liumon/core/math_predictor/requirements.txt ]; then pip install -r liumon/core/math_predictor/requirements.txt; fi

    - name: Run daily pipeline and generate report
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python daily_fetch_and_report_job.py

    - name: Commit and push generated reports
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add reports/
        # 仅当有变化时提交
        git diff-index --quiet HEAD || git commit -m "docs: 🤖 Auto-generate daily report [skip ci]"
        git push
